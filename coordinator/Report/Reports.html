<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Report Dashboard | NSU Coordinator</title>
    <link rel="stylesheet" href="Reports.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="darkmode.css">
</head>
<body>
    <!-- Header -->
    <iframe 
        src="../Profile/profile.html" 
        id="headerFrame"
        frameborder="0"
        scrolling="no"
        title="Header">
    </iframe>

    <!-- Sidebar -->
    <iframe 
        src="../Sidebar/sidebar.html" 
        id="sidebarFrame"
        frameborder="0"
        scrolling="no"
        title="Navigation Sidebar">
    </iframe>

    <!-- Main Dashboard Content -->
    <div class="dashboard-main">
        <!-- Report Cards Row -->
        <div class="row outer-border">
            <button class="card olive" onclick="window.location.href='./ConsolidatedReport/cnacr.php?type=Consolidated Report'">
                <div class="image-box">
                    <img src="/SYSTEM_VERSION_!/coordinator/Report/reportcardpic/cnacr.png" alt="Community Needs Assessment">
                </div>
                <p>Community Needs Assessment Consolidated Report</p>
            </button>

            <button class="card red" onclick="window.location.href='./3ydpreport/3ydpreport.php'">
                <div class="image-box">
                    <img src="/SYSTEM_VERSION_!/coordinator/Report/reportcardpic/3ydp.png" alt="3 Year Development Plan">
                </div>
                <p>3 Year Development Plan</p>
            </button>

            <button class="card purple" onclick="window.location.href='./MonthlyAccomplishmentReport/mar.php'">
                <div class="image-box">
                    <img src="/SYSTEM_VERSION_!/coordinator/Report/reportcardpic/mar.png" alt="Monthly Accomplishment Report">
                </div>
                <p>MONTHLY ACCOMPLISHMENT REPORT</p>
            </button>

            <button class="card orange" onclick="window.location.href='./ProgramDesign/programdesign.php'">
                <div class="image-box">
                    <img src="/SYSTEM_VERSION_!/coordinator/Report/reportcardpic/pd.png" alt="Program Design">
                </div>
                <p>PROGRAM DESIGN</p>
            </button>

            <button>
                <div class="card blue" onclick="window.location.href='./Program_monitoring_form/pmfreport.php'">
                    <div class="image-box">
                        <img src="/SYSTEM_VERSION_!/coordinator/Report/reportcardpic/pmf.png" alt="Program Monitoring Form">
                    </div>
                    <p>PROGRAM MONITORING FORM</p>
                </div>
            </button>

            <button>
                <div class="card blue" onclick="window.location.href='./Evaluation_sheet_for_extension_services/evaluation.php'">
                    <div class="image-box">
                        <img src="/SYSTEM_VERSION_!/coordinator/Report/reportcardpic/evaluation.png" alt="Evaluation Sheet for Extension Services">
                    </div>
                    <p>EVALUATION SHEET FOR EXTENSION SERVICES</p>
                </div>
            </button>

            <button>
                <div class="card blue" onclick="window.location.href='./Certificate_of_appearence/certificate.php'">
                    <div class="image-box">
                        <img src="/SYSTEM_VERSION_!/coordinator/Report/reportcardpic/evaluation.png" alt="Evaluation Sheet for Extension Services">
                    </div>
                    <p>CERTIFICATE OF APPEARANCE</p>
                </div>
            </button>


             <button>
                <div class="card blue" onclick="window.location.href='./Reflection_Paper/reflection.php'">
                    <div class="image-box">
                        <img src="/SYSTEM_VERSION_!/coordinator/Report/reportcardpic/evaluation.png" alt="Evaluation Sheet for Extension Services">
                    </div>
                    <p>MONTHLY ACCOMPLISHMENT REPORT- REFLECTION PAPER</p>
                </div>
            </button>


            
        </div>

        <!-- Need Fix Reports Section -->
        <div class="special-focus-area">
            <div class="section-Orange">
                <div class="filter-row">
                    <span class="label"><i class="fas fa-filter"></i> Type:</span>
                    <select id="reportTypeFilter">
                        <option value="All type">All types</option>
                        <option value="3 Year Development Plan">3 Year Development Plan</option>
                        <option value="Community Needs Assessment Consolidated Report">Community Needs Assessment Consolidated Report</option>
                        <option value="Monthly Accomplishment Report">Monthly Accomplishment Report</option>
                        <option value="Program Design">Program Design</option>
                        <option value="Departmental Planned Initiative Report">Departmental Planned Initiative Report</option>
                    </select>
                </div>
                <div class="table-container">
                    <div class="table-header header-Orange">
                        <i class="fas fa-exclamation-triangle"></i> NEED FIX REPORTS
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Type</th>
                                <th>Title</th>
                                <th>Department</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="needfixTableBody">
                            <!-- Dynamic rows injected via JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <hr class="section-divider">
    </div>

    <script src="/SYSTEM_VERSION_!/coordinator/Report/darkmode.js"></script>
    <script src="/SYSTEM_VERSION_!/coordinator/ReportManagement/js/get.js"></script>
</body>
</html>
