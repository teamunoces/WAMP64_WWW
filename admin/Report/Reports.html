<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Dashboard</title>
    <link rel="stylesheet" href="Reports.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <iframe 
        src="../Profile/profile.html" 
        id="headerFrame"
        frameborder="0"
        scrolling="no"
        title="Header">
    </iframe>

    <!-- Sidebar -->
    <iframe 
        src="../Nav/navigation.html" 
        id="sidebarFrame"
        frameborder="0"
        scrolling="no"
        title="Navigation Sidebar">
    </iframe>

   <!-- Main Dashboard Content -->
    <div class="dashboard-main">
        <!-- Report Cards Row -->
        <div class="row outer-border">
            <button class="card olive" onclick="window.location.href='./ConsolidatedReport/cnacr.php?type=Consolidated Report'">
                <div class="image-box">
                    <img src="/SYSTEM_VERSION_!/coordinator/Report/reportcardpic/cnacr.png" alt="Community Needs Assessment">
                </div>
                <p>Community Needs Assessment Consolidated Report</p>
            </button>

            <button class="card red" onclick="window.location.href='./3ydpreport/3ydpreport.php'">
                <div class="image-box">
                    <img src="/SYSTEM_VERSION_!/coordinator/Report/reportcardpic/3ydp.png" alt="3 Year Development Plan">
                </div>
                <p>3 Year Development Plan</p>
            </button>

            <button class="card purple" onclick="window.location.href='./MonthlyAccomplishmentReport/mar.php'">
                <div class="image-box">
                    <img src="/SYSTEM_VERSION_!/coordinator/Report/reportcardpic/mar.png" alt="Monthly Accomplishment Report">
                </div>
                <p>MONTHLY ACCOMPLISHMENT REPORT</p>
            </button>

            <button class="card orange" onclick="window.location.href='./ProgramDesign/programdesign.php'">
                <div class="image-box">
                    <img src="/SYSTEM_VERSION_!/coordinator/Report/reportcardpic/pd.png" alt="Program Design">
                </div>
                <p>PROGRAM DESIGN</p>
            </button>

            <button>
                <div class="card navy" onclick="window.location.href='./Program_monitoring_form/pmfreport.php'">
                    <div class="image-box">
                        <img src="/SYSTEM_VERSION_!/coordinator/Report/reportcardpic/prog.jpg" alt="Program Monitoring Form">
                    </div>
                    <p>PROGRAM MONITORING FORM</p>
                </div>
            </button>

            <button>
                <div class="card green" onclick="window.location.href='./Evaluation_sheet_for_extension_services/evaluation.php'">
                    <div class="image-box">
                        <img src="/SYSTEM_VERSION_!/coordinator/Report/reportcardpic/eval.png" alt="Evaluation Sheet for Extension Services">
                    </div>
                    <p>EVALUATION SHEET FOR EXTENSION SERVICES</p>
                </div>
            </button>

            <button>
                <div class="card teal" onclick="window.location.href='./Certificate_of_appearence/certificate.php'">
                    <div class="image-box">
                        <img src="/SYSTEM_VERSION_!/coordinator/Report/reportcardpic/certapp.png" alt="Evaluation Sheet for Extension Services">
                    </div>
                    <p>CERTIFICATE OF APPEARANCE</p>
                </div>
            </button>


             <button>
                <div class="card indigo" onclick="window.location.href='./Reflection_Paper/reflection.php'">
                    <div class="image-box">
                        <img src="/SYSTEM_VERSION_!/coordinator/Report/reportcardpic/ref.png" alt="Evaluation Sheet for Extension Services">
                    </div>
                    <p>MONTHLY ACCOMPLISHMENT REPORT- REFLECTION PAPER</p>
                </div>
            </button>

             <button>
                <div class="card cyan" onclick="window.location.href='./Narrative_Report/narrative.php'">
                    <div class="image-box">
                        <img src="/SYSTEM_VERSION_!/coordinator/Report/reportcardpic/narra.png" alt="Evaluation Sheet for Extension Services">
                    </div>
                    <p>MONTHLY ACCOMPLISHMENT REPORT- NARRATIVE REPORT</p>
                </div>
            </button>
            
            
        </div>
        <div class="section-green">
        <div class="reports-section">
        <div class="filter-row">
            <span class="label">Type:</span>
           <select id="adminFilterSelect">
                    <option>All type</option>
                    <option value="3 Year Development Plan">3 Year Development Plan</option>
                    <option value="Community Needs Assessment Consolidated Report">Community Needs Assessment Consolidated Report</option>
                    <option value="Monthly Accomplishment Report">Monthly Accomplishment Report</option>
                    <option value="Program Design">Program Design</option>
                    <option value="CNACR">Commnunity Needs Assessment Consolidated Results</option>
                </select>
        </div>
    </div>
    </div>

    <div class="table-section">
        <div class="table-header">
            <span>ADMIN'S REPORTS</span>
        </div>
        <div class="admin-table-container">
            <table>
                <thead>
                    <tr>
                        <th>Type</th>
                        <th>Title</th> 
                        <th>Department</th>
                        <th>Date Archive</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                        <!-- Rows will be dynamically added by JS -->
                </tbody>
            </table>
        </div>
    </div>
    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-file-pdf"></i> Manage Report Files</h2>
                <span class="close" onclick="closeUploadModal()">&times;</span>
            </div>
            <div class="modal-body">
                <!-- Report info -->
                <div class="report-info">
                    <div class="report-title">
                        <strong>Report:</strong> <span id="modalReportTitle"></span>
                    </div>
                    <div class="file-count">
                        <strong>Files:</strong> <span id="fileCount" class="file-count-ok">0/4</span>
                    </div>
                </div>
                
                <!-- Current Files Section -->
                <div class="files-section">
                    <h3><i class="fas fa-folder-open"></i> Current Files</h3>
                    <div id="fileList" class="files-grid">
                        <p class="loading">Loading files...</p>
                    </div>
                </div>
                
                <!-- Upload Section -->
                <div class="upload-section">
                    <h3><i class="fas fa-cloud-upload-alt"></i> Upload New Files</h3>
                    <p class="upload-info">Select up to 4 PDF files (max 10MB each)</p>
                    
                    <div class="file-input-container">
                        <input type="file" id="fileInput" accept=".pdf" multiple>
                        <label for="fileInput" class="file-input-label">
                            <i class="fas fa-cloud-upload-alt"></i> Choose Files
                        </label>
                        <p class="file-input-hint">Hold Ctrl (or Cmd on Mac) to select multiple files</p>
                    </div>
                    
                    <!-- Selected Files List -->
                    <div id="selectedFilesList" class="selected-files-list">
                        <p class="no-files">No files selected</p>
                    </div>
                    
                    <!-- Upload Button -->
                    <button class="upload-btn" style="display: none;">
                        <i class="fas fa-upload"></i> Upload Selected Files
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/SYSTEM_VERSION_!/admin/Report/darkmode.js"></script>
    <!-- CORRECT PATH: Go up one level to admin, then into ReportManagement/js/get.js -->
    <script src="/SYSTEM_VERSION_!/admin/ReportManagement/js/get.js"></script>
</body>
</html>
